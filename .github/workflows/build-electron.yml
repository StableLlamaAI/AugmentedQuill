name: Build Standalone App (Electron)

on:
  release:
    # Run this workflow when a release or pre-release is published
    types: [published, released, prereleased]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pyinstaller uvicorn

    - name: Set Electron package version from release tag
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const tag = context.payload.release && context.payload.release.tag_name;
          if (!tag) throw new Error('Release tag not available on context.payload.release.tag_name');
          const version = tag.startsWith('v') ? tag.slice(1) : tag;
          core.info(`Setting electron/package.json version to ${version}`);
          const pkgPath = 'electron/package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));

    - name: Build Frontend
      run: |
        cd src/frontend
        npm ci
        npm run build

    - name: Build Backend with PyInstaller (Directory Mode)
      run: |
        python build_backend.py onedir

    - name: Build Electron App
      run: |
        cd electron
        npm install
        npm run dist
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Electron artifacts to GitHub Release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        release_upload_url=$(jq -r .release.upload_url < "$GITHUB_EVENT_PATH")
        if [ -z "$release_upload_url" ] || [ "$release_upload_url" = "null" ]; then
          echo "No release upload URL found, skipping release asset upload"
          exit 0
        fi

        # Strip the template suffix path `{/name,label}` from upload_url.
        release_upload_url="${release_upload_url%\{*}"

        for file in electron/dist/*; do
          [ -f "$file" ] || continue
          filename=$(basename "$file")
          filename_url=$(python -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$filename")
          echo "Uploading $filename to release..."
          curl -sSL -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$file" \
            "${release_upload_url}?name=${filename_url}"
        done

    - name: Upload Artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: AugmentedQuill-Electron-Windows
        path: electron/dist/*.exe
        if-no-files-found: ignore

    - name: Upload Artifact (Mac)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: AugmentedQuill-Electron-Mac
        path: electron/dist/*.dmg
        if-no-files-found: ignore

    - name: Upload Artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: AugmentedQuill-Electron-Linux
        path: electron/dist/*.AppImage
        if-no-files-found: ignore
