name: Create Release (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New release version (tag), e.g. v1.2.3'
        required: true
        type: string
      prerelease:
        description: 'Set as a pre-release'
        required: false
        default: false
        type: boolean
      body:
        description: 'Release notes / body'
        required: false
        type: string

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.event.inputs.version }}

jobs:
  pre-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure workflow is running on allowed branches
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [ "${BRANCH_NAME}" != "main" ] && [ "${BRANCH_NAME}" != "develop" ]; then
            echo "This workflow can only be run on main or develop.";
            echo "Current branch: ${BRANCH_NAME}";
            exit 1;
          fi

  build-backend-onedir:
    needs: pre-check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller uvicorn
          cd src/frontend
          npm ci
          npm run build
      - name: Build Backend (onedir)
        run: python build_backend.py onedir

      - name: Package Backend OneDir
        run: |
          mkdir -p dist/release
          tar -czf dist/release/backend-onedir-${{ runner.os }}.tar.gz -C dist run_app

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-onedir-${{ runner.os }}
          path: dist/release/backend-onedir-${{ runner.os }}.tar.gz

  build-electron:
    needs: build-backend-onedir
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Download Backend Artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-onedir-${{ runner.os }}
          path: dist/release
      - name: Extract Backend Artifact
        run: |
          mkdir -p dist/run_app
          python -c "import os, tarfile; archive = f'dist/release/backend-onedir-{os.environ[\"RUNNER_OS\"]}.tar.gz'; tarfile.open(archive, 'r:gz').extractall('dist')"
          ls -la dist/run_app
        shell: bash
      - name: Verify Extracted Backend Bundle
        run: |
          python -c "import os; runner_os = os.environ['RUNNER_OS']; expected = os.path.join('dist', 'run_app', 'run_app.exe' if runner_os == 'Windows' else 'run_app'); import sys; import pathlib; expected_path = pathlib.Path(expected); sys.exit(0 if expected_path.is_file() else f'Expected backend executable not found after extraction: {expected}')"
        shell: bash
      - name: Set version in electron/package.json
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          VERSION_CLEAN="${VERSION#v}"
          # Use python for cross-platform JSON editing to avoid sed incompatibilities
          python -c "import json; p='electron/package.json'; d=json.load(open(p)); d['version']='${VERSION_CLEAN}'; json.dump(d, open(p, 'w'), indent=2)"
        shell: bash
      - name: Build Electron App
        run: |
          cd electron
          npm install
          npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Electron Artifact
        uses: actions/upload-artifact@v7
        with:
          name: electron-assets-${{ runner.os }}
          path: |
            electron/dist/*.exe
            electron/dist/*.dmg
            electron/dist/*.AppImage
            electron/dist/*.zip
            electron/dist/*.tar.gz
          if-no-files-found: ignore

  build-backend-onefile:
    needs: pre-check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller uvicorn
          cd src/frontend
          npm ci
          npm run build
      - name: Build Backend (onefile)
        run: python build_backend.py onefile
      - name: Upload Onefile Artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-onefile-${{ runner.os }}
          path: dist/AugmentedQuill*

  create-release:
    needs: [build-electron, build-backend-onefile]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-assets
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          # Keep only final application installer artifacts, not intermediate backend-only packages
          find all-assets -type f \( -name '*Setup*.exe' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          echo "Release asset candidates:"
          ls -la release-assets

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.body }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          commit: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "release-assets/*"
          allowUpdates: true
          replacesArtifacts: true

  publish-docker:
    needs: create-release
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-docker.yml
    with:
      version: ${{ github.event.inputs.version }}
    secrets: inherit
