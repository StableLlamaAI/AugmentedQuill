name: Create Release (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New release version (tag), e.g. v1.2.3'
        required: true
        type: string
      prerelease:
        description: 'Set as a pre-release'
        required: false
        default: false
        type: boolean
      body:
        description: 'Release notes / body'
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Ensure workflow is running on allowed branches
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [ "${BRANCH_NAME}" != "main" ] && [ "${BRANCH_NAME}" != "develop" ]; then
            echo "This workflow can only be run on main or develop.";
            echo "Current branch: ${BRANCH_NAME}";
            exit 1;
          fi

      - name: Create GitHub Release (action)
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.body }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          commit: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
